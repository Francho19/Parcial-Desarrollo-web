<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>Rstablecer contraseña</title>
    <link rel="stylesheet" href="/Primer-parcial-desarrollo-web/css/styles.css">
    <link rel="stylesheet" href="/Primer-parcial-desarrollo-web/plugins/css/all.min.css">
</head>
<body>
    <main class="login">
        <section class="login__content">
            <h1 class="login__title">Rstablecer contraseña</h1> 
            <form class="form">
                <div class="form__field form__field--password">
                    <label class="form__label" for="password">Contraseña</label>
                    <input class="form__input" type ="password" id="password" placeholder="⁕⁕⁕⁕⁕⁕" />
                    <span class="form__icons"><i class="fa-solid fa-eye form__icon"></i></span>
                </div>
                 <div class="form__field form__field--password">
                    <label class="form__label" for="repeat_password">Repetir contraseña</label>
                    <input class="form__input" type ="password" id="repeat_password" placeholder="⁕⁕⁕⁕⁕⁕" />
                    <span class="form__icons"><i class="fa-solid fa-eye form__icon"></i></span>
                </div>
                <button class="form__button" type="submit">Rstablecer contraseña</button>
            </form>
            <nav class="login__nav">
                 <a class="login__link" href="/Primer-parcial-desarrollo-web/index.html">¿Ya tienes una cuenta? <span class="login__link--yellow">Acceder</span></a>
                 <a class="login__link" href="/Primer-parcial-desarrollo-web/forgot-password.html">¿Has olvidado la contraseña? <span class="login__link--yellow">restablecer</span></a>
                </nav>
        </section>
    </main>
    <script src="/Primer-parcial-desarrollo-web/plugins/js/all.min.js"></script>
    <script>
        document.querySelectorAll('.form__icons').forEach(element => {
           
            element.addEventListener('click', () => {
              const field = element.closest('.form__field--password');
              const input = field.querySelector('.form__input');
              const icon = field.querySelector('.form__icon');

              if (input) {
                if (input.type === 'password') {
                    input.type ='text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash')
                } else {
                    input.type = 'password'
                    icon.classList.remove('fa-eye-slash')
                    icon.classList.add('fa-eye');
                }
              }
              
                
            })
            
        });
    </script>
</body>
</html>
