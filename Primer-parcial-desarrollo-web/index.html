<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>techStore</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- HEADER -->
    <app-header></app-header>

    <!-- LAYOUT -->
    <div class="layout">
        <app-sidebar></app-sidebar>
        <main id="contenido" class="productos-grid"></main>
    </div>

    <!-- CARRITO -->
    <div id="carrito" style="color:white; padding:2rem;"></div>

    <!-- RECIBO -->
    <div id="recibo" style="color:white; padding:20px;"></div>

    <!-- FOOTER -->
    <app-footer></app-footer>

    <!-- TEMPLATE -->
    <template id="productTemplate">
        <div class="producto">
            <img class="imagen" alt="Producto">
            <div class="producto__info">
                <h3 class="nombre"></h3>
                <p class="descripcion"></p>
                <p class="precio"></p>
                <button class="btn-carrito">Agregar 🛒</button>
            </div>
        </div>
    </template>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
