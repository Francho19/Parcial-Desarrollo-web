<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - techStore</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<main class="login">
    <section class="login__content">

        <h1 class="login__title">Iniciar sesión</h1>

        <form class="form">

            <div class="form__field">
                <label class="form__label">Usuario</label>
                <input class="form__input" type="text" id="usuario" placeholder="user" required>
            </div>

            <div class="form__field form__field--password">
                <label class="form__label">Contraseña</label>
                <input class="form__input" type="password" id="password" placeholder="••••••" required>

                <span class="form__icons">👀</span>

                <small class="form__hint">
                    Usuario: user | Contraseña: admin
                </small>
            </div>

            <button class="form__button" id="btnLogin">Entrar</button>

        </form>

    </section>
</main>

<script src="js/login.js"></script>

</body>
</html>
