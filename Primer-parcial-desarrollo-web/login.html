
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - techStore</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
 
<div class="login">
  <div class="login__content">
 
    <h2 class="login__title">techStore 🔐</h2>
 
    <div id="error-msg" class="form__error" style="display:none;"></div>
 
    <div class="form__field">
      <label class="form__label" for="usuario">Usuario</label>
      <input type="text" id="usuario" class="form__input" autocomplete="username">
    </div>
 
    <div class="form__field form__field--password">
      <label class="form__label" for="password">Contraseña</label>
      <input type="password" id="password" class="form__input" autocomplete="current-password">
      <span class="form__icons" role="button" aria-label="Mostrar contraseña">👀</span>
    </div>
 
    <label class="form__remember">
      <input type="checkbox" id="recordar"> Recordar sesión
    </label>
 
    <button class="form__button" id="btnLogin">Ingresar</button>
 
    <div class="form__forgot">
      <a href="#">¿Olvidaste tu contraseña?</a>
    </div>
 
  </div>
</div>
 
<script src="js/login.js"></script>
</body>
</html>
