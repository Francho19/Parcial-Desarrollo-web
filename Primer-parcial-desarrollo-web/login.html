<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/Primer-parcial-desarrollo-web/css/styles.css">

    <title>Login</title>
</head>
<body>

    <div id="header"></div>

    <main class="login">
        <section class="login__content">
            <h1 class="login__title">Iniciar sesión</h1>

            <form class="form">
                <div class="form__field">
                    <label class="form__label">Correo</label>
                    <input class="form__input" type="email" placeholder="User@example.com" required>
                </div>

                <div class="form__field form__field--password">
                    <label class="form__label">Contraseña </label>
                    <input class="form__input" type="password" placeholder="••••••" required>

                    <span class="form__icons">👀</span>
                </div>

                <button class="form__button">Entrar</button>
            </form>
        </section>
    </main>

    <div id="footer"></div>

    <script src="/Primer-parcial-desarrollo-web/js/main.js"></script>
    <script src="/Primer-parcial-desarrollo-web/js/login.js"></script>
</body>
</html>
